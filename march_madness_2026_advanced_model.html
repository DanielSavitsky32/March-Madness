<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>March Madness 2026 — Advanced Predictive Model</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#08090d;--bg2:#0f1117;--bg3:#171a24;--bg4:#1f2333;--bg5:#282d3e;
--fg:#e4e6ee;--fg2:#9ea3b5;--fg3:#626880;
--o:#e8622c;--o2:#f28a50;--o-dim:rgba(232,98,44,.1);
--g:#1eb854;--g-dim:rgba(30,184,84,.08);
--r:#e03e3e;--r-dim:rgba(224,62,62,.08);
--b:#3d7cf5;--b-dim:rgba(61,124,245,.08);
--p:#9b5cf5;--p-dim:rgba(155,92,245,.08);
--t:#10b5a0;--t-dim:rgba(16,181,160,.08);
--y:#e5a200;--y-dim:rgba(229,162,0,.08);
--bdr:rgba(255,255,255,.05);--bdr2:rgba(255,255,255,.09);
--f:'Instrument Sans',system-ui,sans-serif;--m:'JetBrains Mono',monospace;
--rad:8px;--rad2:14px;
}
html{font-family:var(--f);background:var(--bg);color:var(--fg);font-size:14px;line-height:1.55}
body{padding:0}
button{font-family:var(--f);cursor:pointer;border:none;background:none;color:var(--fg)}
input[type=range]{-webkit-appearance:none;background:transparent;width:100%}
input[type=range]::-webkit-slider-track{height:3px;background:var(--bg5);border-radius:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--o);margin-top:-5.5px;cursor:pointer}
::selection{background:rgba(232,98,44,.3)}
.wrap{max-width:1180px;margin:0 auto;padding:20px 16px 60px}

/* HEADER */
.hdr{text-align:center;padding:44px 0 28px;position:relative}
.hdr::after{content:'';position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:320px;height:260px;background:radial-gradient(ellipse,rgba(232,98,44,.12),transparent 70%);pointer-events:none}
.hdr h1{font-size:clamp(26px,4.5vw,40px);font-weight:700;letter-spacing:-.03em;line-height:1.05}
.hdr h1 em{font-style:normal;background:linear-gradient(135deg,var(--o),var(--y));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .sub{color:var(--fg3);font-size:13px;max-width:620px;margin:10px auto 0}
.pill{display:inline-block;font-family:var(--m);font-size:10px;text-transform:uppercase;letter-spacing:.1em;padding:3px 10px;border-radius:20px;margin-bottom:10px}
.pill-o{background:var(--o-dim);color:var(--o)}

/* SECTION */
.sec{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rad2);padding:22px;margin-bottom:20px}
.sec h2{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec h2 .ico{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.sec p{color:var(--fg2);font-size:12.5px;line-height:1.7}
.sec p strong{color:var(--fg);font-weight:600}

/* PRINCIPLE CARDS */
.princ-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-top:14px}
.princ{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rad);padding:12px;position:relative;overflow:hidden}
.princ::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:2px}
.princ-1::before{background:var(--o)}.princ-2::before{background:var(--b)}.princ-3::before{background:var(--y)}
.princ-4::before{background:var(--t)}.princ-5::before{background:var(--p)}.princ-6::before{background:var(--g)}
.princ .pw{font-family:var(--m);font-size:18px;font-weight:700;margin-bottom:2px}
.princ .pl{font-size:11px;color:var(--fg3);text-transform:uppercase;letter-spacing:.04em}

/* WEIGHTS */
.wrow{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bdr)}
.wrow:last-child{border-bottom:none}
.wlbl{width:200px;font-size:12px;color:var(--fg2);flex-shrink:0}
.wslider{flex:1}
.wval{width:40px;text-align:right;font-family:var(--m);font-size:12px;color:var(--o)}
.presets{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.pbtn{padding:5px 12px;border-radius:16px;font-size:11px;font-weight:500;border:1px solid var(--bdr2);transition:all .15s}
.pbtn:hover{border-color:var(--o);color:var(--o)}
.pbtn.on{background:var(--o);color:#000;border-color:var(--o)}

/* TABS */
.tabs{display:flex;gap:2px;margin-bottom:20px;background:var(--bg2);border-radius:var(--rad);padding:3px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:9px 16px;border-radius:6px;font-size:12px;font-weight:500;color:var(--fg3);transition:all .12s;white-space:nowrap}
.tab:hover{color:var(--fg)}.tab.on{background:var(--bg4);color:var(--fg)}

/* MATCHUP */
.rlbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--fg3);margin:18px 0 8px;font-family:var(--m)}
.mu{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rad);margin-bottom:6px;overflow:hidden;transition:border-color .15s}
.mu:hover{border-color:var(--bdr2)}
.tr{display:flex;align-items:center;padding:9px 12px;gap:8px;position:relative;transition:background .1s}
.tr.w{background:var(--g-dim)}
.tr.l{opacity:.4}
.tr .sd{font-family:var(--m);font-size:10px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--bg4);color:var(--fg3);font-weight:700;flex-shrink:0}
.tr.w .sd{background:var(--g-dim);color:var(--g)}
.tr .nm{flex:1;font-size:12.5px;font-weight:500}
.tr .rec{font-size:10px;color:var(--fg3);font-family:var(--m)}
.tr .pct{font-family:var(--m);font-size:12px;font-weight:700;min-width:44px;text-align:right}
.tr.w .pct{color:var(--g)}
.tr .bar{position:absolute;left:0;bottom:0;height:2px;border-radius:1px;background:var(--o);transition:width .3s}
.mu-div{height:1px;background:var(--bdr);margin:0 12px}
.mu-ft{padding:5px 12px;font-size:10px;color:var(--fg3);display:flex;justify-content:space-between;border-top:1px solid var(--bdr);flex-wrap:wrap;gap:4px}
.mu-ft span{white-space:nowrap}
.utag{font-family:var(--m);font-size:9px;padding:2px 5px;border-radius:3px;background:var(--y-dim);color:var(--y)}
.ltag{font-family:var(--m);font-size:9px;padding:2px 5px;border-radius:3px;background:var(--r-dim);color:var(--r)}

/* CHAMP */
.champ{text-align:center;margin:28px 0;padding:28px;background:var(--bg2);border:2px solid var(--o);border-radius:var(--rad2);position:relative;overflow:hidden}
.champ::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at center,rgba(232,98,44,.08),transparent 70%);pointer-events:none}
.champ .trophy{font-size:42px;margin-bottom:6px}
.champ h2{font-size:28px;font-weight:700;background:linear-gradient(135deg,var(--o),var(--y));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.champ .det{color:var(--fg2);margin-top:6px;font-size:13px}
.champ .cp{font-family:var(--m);font-size:18px;color:var(--o);margin-top:4px}

/* FF */
.ff{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.ffc{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rad2);padding:16px;text-align:center}
.ffc.chp{border-color:var(--o);background:var(--o-dim)}
.ffc .fs{font-family:var(--m);font-size:10px;color:var(--fg3);margin-bottom:3px}
.ffc .fn{font-size:16px;font-weight:700}
.ffc.chp .fn{color:var(--o)}
.ffc .fp{font-family:var(--m);font-size:12px;color:var(--fg2);margin-top:2px}

/* POWER TABLE */
.ptbl{width:100%;border-collapse:collapse}
.ptbl th{text-align:left;padding:8px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg3);border-bottom:1px solid var(--bdr2);font-family:var(--m);position:sticky;top:0;background:var(--bg)}
.ptbl td{padding:8px 10px;border-bottom:1px solid var(--bdr);font-size:12px;vertical-align:middle}
.ptbl tr:hover td{background:var(--bg2)}
.ptbl .rk{font-family:var(--m);font-weight:700;color:var(--o);width:36px}
.ptbl .sc{font-family:var(--m);font-weight:700}
.barbg{width:100%;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.barfill{height:100%;border-radius:3px;transition:width .3s}
.sp{font-size:10px;padding:2px 6px;border-radius:3px;font-family:var(--m);display:inline-block}
.sp-b{background:var(--b-dim);color:var(--b)}
.sp-g{background:var(--g-dim);color:var(--g)}
.sp-p{background:var(--p-dim);color:var(--p)}
.sp-y{background:var(--y-dim);color:var(--y)}
.sp-r{background:var(--r-dim);color:var(--r)}
.sp-t{background:var(--t-dim);color:var(--t)}

/* INSIGHT CARDS */
.ins-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-top:14px}
.ins{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rad);padding:14px}
.ins .it{font-size:13px;font-weight:600;margin-bottom:4px}
.ins .id{font-size:11.5px;color:var(--fg2);line-height:1.6}

@media(max-width:640px){
.wrap{padding:12px 10px 40px}
.ff{grid-template-columns:1fr}
.princ-grid{grid-template-columns:1fr 1fr}
.wlbl{width:130px;font-size:11px}
.mu-ft{font-size:9px}
}
</style>
</head>

// ============================================================
//  SCORING ENGINE
// ============================================================
function norm(val, min, max) { return Math.max(0, Math.min(100, (val - min) / (max - min) * 100)); }

function score(name) {
  const t = T[name];
  const wTotal = Object.values(W).reduce((a,b) => a+b, 0) || 1;

  // 1. AdjEM (range roughly -15 to +42)
  const adjEMscore = norm(t.adjEM, -15, 42);

  // 2. Defensive efficiency (lower rank = better, invert)
  const defScore = norm(365 - t.defRk, 0, 365);
  
  // 3. Luck regression: lucky teams get PENALIZED
  // luck > 0 means overperformed close games → regress
  const luckPenalty = (1 - t.luck * 8) * 50; // luck=0 → 50, luck=.08 → 18
  const luckScore = Math.max(0, Math.min(100, luckPenalty));

  // 4. Offensive efficiency
  const offScore = norm(365 - t.offRk, 0, 365);

  // 5. Strength of schedule (already 0-100)
  const sosScore = t.sos;

  // 6. Experience
  const expScore = t.exp * 10;

  // 7. Shooting: 3PT% (range .32-.39) + FT rate (range .27-.40)
  const threePt = norm(t.tPct, .320, .390);
  const ftR = norm(t.ftRate, .27, .40);
  const shootScore = threePt * 0.6 + ftR * 0.4;

  // 8. Turnovers: low TO rate good + high forced TO rate good
  const toOwn = norm(20 - t.toRate, 0, 6); // lower is better → invert
  const toForced = norm(t.toForce, 16, 23);
  const toScore = toOwn * 0.5 + toForced * 0.5;

  // 9. Rebounding: ORB% + DRB%
  const orbS = norm(t.orbPct, 24, 36);
  const drbS = norm(t.drbPct, 68, 80);
  const rebScore = orbS * 0.4 + drbS * 0.6;

  // 10. Pace — moderate pace is optimal for March (65-71 range);
  // extremes (very fast or very slow) are slight disadvantages
  const optimalPace = 68;
  const paceDev = Math.abs(t.pace - optimalPace);
  const paceScore = norm(8 - paceDev, 0, 8);

  // 11. Scoring run volatility (high = makes big runs, survives opponent runs)
  const runScore = t.runVol * 10;

  // 12. Injury discount (higher inj = worse)
  const injScore = (10 - t.inj) * 10;

  return (
    (W.adjEM / wTotal)      * adjEMscore +
    (W.defense / wTotal)    * defScore +
    (W.luck / wTotal)       * luckScore +
    (W.offense / wTotal)    * offScore +
    (W.sos / wTotal)        * sosScore +
    (W.experience / wTotal) * expScore +
    (W.shooting / wTotal)   * shootScore +
    (W.turnovers / wTotal)  * toScore +
    (W.rebounding / wTotal) * rebScore +
    (W.pace / wTotal)       * paceScore +
    (W.runs / wTotal)       * runScore +
    (W.injury / wTotal)     * injScore
  );
}

function winProb(a, b) {
  const d = score(a) - score(b);
  return 1 / (1 + Math.exp(-d * 0.115));
}

// ============================================================
//  BRACKET SIMULATION
// ============================================================
function simBracket() {
  const regions = ["East","West","Midwest","South"];
  const res = {};
  regions.forEach(reg => {
    const teams = Object.keys(T).filter(n => T[n].r === reg).sort((a,b) => T[a].s - T[b].s);
    const seedPairs = [[0,15],[7,8],[4,11],[3,12],[5,10],[2,13],[6,9],[1,14]];
    let rd = seedPairs.map(([a,b]) => [teams[a], teams[b]]);
    res[reg] = {rounds:[]};
    const rNames = ["Round of 64","Round of 32","Sweet 16","Elite Eight"];
    for (let r = 0; r < 4; r++) {
      const rr = [];
      const next = [];
      for (const [a, b] of rd) {
        const p = winProb(a, b);
        const w = p >= .5 ? a : b;
        const l = p >= .5 ? b : a;
        const wp = p >= .5 ? p : 1-p;
        const upset = T[w].s > T[l].s + 2;
        const luckFlag = (T[l].luck >= .04 && T[l].s < T[w].s);
        rr.push({a, b, pA:p, w, l, wp, upset, luckFlag});
        next.push(w);
      }
      res[reg].rounds.push({name:rNames[r], matchups:rr});
      const paired = [];
      for (let i=0;i<next.length;i+=2) if(next[i+1]) paired.push([next[i],next[i+1]]);
      rd = paired;
    }
    res[reg].champ = res[reg].rounds[3].matchups[0].w;
  });
  const ff = regions.map(r => res[r].champ);
  const s1p = winProb(ff[0],ff[1]); const s1w = s1p>=.5?ff[0]:ff[1];
  const s2p = winProb(ff[2],ff[3]); const s2w = s2p>=.5?ff[2]:ff[3];
  const fp = winProb(s1w,s2w); const champ = fp>=.5?s1w:s2w;
  res.ff = {teams:ff, s1:{a:ff[0],b:ff[1],pA:s1p,w:s1w}, s2:{a:ff[2],b:ff[3],pA:s2p,w:s2w}, fin:{a:s1w,b:s2w,pA:fp,w:champ}, champ};
  return res;
}

function powerRankings() {
  return Object.keys(T).map(n => ({n, sc:score(n), ...T[n]})).sort((a,b) => b.sc - a.sc);
}

function renderOverview(res) {

    <div class="cp">${((ff.fin.pA>=.5?ff.fin.pA:1-ff.fin.pA)*100).toFixed(0)}% in the final</div>
  </div>`;
  h += `<div class="rlbl">Final Four</div><div class="ff">`;

  });
  h += `</div>`;
  h += `<div class="rlbl">National Semifinals</div>`;
  h += mu(ff.s1.a,ff.s1.b,ff.s1.pA,ff.s1.w);
  h += mu(ff.s2.a,ff.s2.b,ff.s2.pA,ff.s2.w);
  h += `<div class="rlbl">National Championship</div>`;
  h += mu(ff.fin.a,ff.fin.b,ff.fin.pA,ff.fin.w);

function renderRegion(res, reg) {
  const r = res[reg];

    round.matchups.forEach(m => h += mu(m.a, m.b, m.pA, m.w, m.luckFlag));

  return h;

function mu(a, b, pA, w, luckFlag) {
  const tA=T[a],tB=T[b];
  const pctA=(pA*100).toFixed(1), pctB=((1-pA)*100).toFixed(1);
  const upset = w===a ? tA.s>tB.s+2 : tB.s>tA.s+2;
  const loser = w===a?b:a;
  const lf = luckFlag && T[loser].luck>=.04;
  return `<div class="mu"><div class="matchup-teams">
    <div class="tr ${w===a?'w':pA<.5?'l':''}"><span class="sd">${tA.s}</span><span class="nm">${a}</span><span class="rec">${tA.rec}</span><span class="pct">${pctA}%</span><div class="bar" style="width:${pctA}%"></div></div>
    <div class="mu-div"></div>
    <div class="tr ${w===b?'w':pA>=.5?'l':''}"><span class="sd">${tB.s}</span><span class="nm">${b}</span><span class="rec">${tB.rec}</span><span class="pct">${pctB}%</span><div class="bar" style="width:${pctB}%"></div></div>
  </div><div class="mu-ft">
    <span>AdjEM: ${tA.adjEM>0?'+':''}${tA.adjEM} vs ${tB.adjEM>0?'+':''}${tB.adjEM}</span>
    <span>Def: #${tA.defRk} vs #${tB.defRk}</span>
    <span>Pace: ${tA.pace} vs ${tB.pace}</span>
    ${upset?'<span class="utag">UPSET</span>':''}
    ${lf?'<span class="ltag">LUCK REGRESSION</span>':''}
  </div></div>`;
}

function renderPower(pr, mx) {
  let h = `<div style="overflow-x:auto"><table class="ptbl"><thead><tr><th>Rk</th><th>Team</th><th>Sd</th><th>Reg</th><th>Score</th><th style="width:18%">Str</th><th>AdjEM</th><th>Def</th><th>Off</th><th>Luck</th><th>Runs</th></tr></thead><tbody>`;
  pr.slice(0,45).forEach((t,i) => {
    const pct = t.sc/mx*100;
    const c = i<4?'var(--o)':i<10?'var(--b)':i<20?'var(--t)':'var(--fg3)';
    const luckC = t.luck>.03?'sp-r':t.luck<-.01?'sp-g':'sp-y';
    h += `<tr><td class="rk">${i+1}</td><td style="font-weight:600">${t.n}</td><td style="font-family:var(--m)">${t.s}</td><td style="color:var(--fg3)">${t.r}</td>
    <td class="sc" style="color:${c}">${t.sc.toFixed(1)}</td><td><div class="barbg"><div class="barfill" style="width:${pct}%;background:${c}"></div></div></td>
    <td><span class="sp sp-p">${t.adjEM>0?'+':''}${t.adjEM}</span></td>
    <td><span class="sp sp-g">#${t.defRk}</span></td>
    <td><span class="sp sp-b">#${t.offRk}</span></td>
    <td><span class="sp ${luckC}">${t.luck>=0?'+':''}${(t.luck*100).toFixed(0)}%</span></td>
    <td><span class="sp sp-t">${t.runVol}</span></td></tr>`;
  });
  h += `</tbody></table></div>`;
  return h;
}

function renderInsights(pr) {
  // Find interesting model outputs
  const luckyTeams = pr.filter(t => t.luck >= .04).sort((a,b) => b.luck - a.luck).slice(0,5);
  const unluckyTeams = pr.filter(t => t.luck <= -.02).sort((a,b) => a.luck - b.luck).slice(0,5);
  const bestDef = [...pr].sort((a,b) => a.defRk - b.defRk).slice(0,5);
  const bestRuns = [...pr].sort((a,b) => b.runVol - a.runVol).slice(0,5);
  const highTO = [...pr].sort((a,b) => b.toForce - a.toForce).slice(0,5);
  const lowTO = [...pr].sort((a,b) => a.toRate - b.toRate).slice(0,5);

  let h = `<div class="sec">
    <h2><span class="ico" style="background:var(--y-dim);color:var(--y)">⚡</span> Model-driven insights</h2>
    <div class="ins-grid">
      <div class="ins"><div class="it" style="color:var(--r)">Luck regression candidates</div><div class="id">These teams won more close games than expected. The model penalizes them — historically, "lucky" teams underperform their seed in March.<br><br>${luckyTeams.map(t => `<strong>${t.n}</strong> (${t.s}-seed, luck: +${(t.luck*100).toFixed(0)}%)`).join(' · ')}</div></div>
      <div class="ins"><div class="it" style="color:var(--g)">Unlucky / undervalued teams</div><div class="id">These teams' records understate their true quality. They lost close games and should be better than their seed suggests.<br><br>${unluckyTeams.map(t => `<strong>${t.n}</strong> (${t.s}-seed, luck: ${(t.luck*100).toFixed(0)}%)`).join(' · ')}</div></div>
      <div class="ins"><div class="it" style="color:var(--b)">Elite defenses (travel in March)</div><div class="id">Defense is the most portable skill in tournament play — new venues, hostile crowds, single-elimination pressure all favor teams that can get stops.<br><br>${bestDef.map(t => `<strong>${t.n}</strong> (Def #${t.defRk})`).join(' · ')}</div></div>
      <div class="ins"><div class="it" style="color:var(--o)">Best scoring run teams</div><div class="id">Teams that generate large scoring bursts and prevent opponents from doing the same have a structural advantage in single-elimination play where momentum swings decide games.<br><br>${bestRuns.map(t => `<strong>${t.n}</strong> (RunVol: ${t.runVol})`).join(' · ')}</div></div>
      <div class="ins"><div class="it" style="color:var(--t)">Turnover machines (force TOs)</div><div class="id">Forcing turnovers creates chaos and extra possessions — critical in high-pressure March environments where every possession matters.<br><br>${highTO.map(t => `<strong>${t.n}</strong> (Force: ${t.toForce}%)`).join(' · ')}</div></div>
      <div class="ins"><div class="it" style="color:var(--p)">Ball security (lowest TO rate)</div><div class="id">Taking care of the ball under pressure is essential when facing tournament-caliber defenses. These teams rarely beat themselves.<br><br>${lowTO.map(t => `<strong>${t.n}</strong> (TO: ${t.toRate}%)`).join(' · ')}</div></div>
    </div>
  </div>`;

  // Specific calls
  h += `<div class="sec">
    <h2><span class="ico" style="background:var(--r-dim);color:var(--r)">🎯</span> Specific model calls</h2>
    <p><strong style="color:var(--r)">Kansas (4-seed, East):</strong> Peterson's injury situation is devastating. The model assigns a severe injury discount, and their luck factor (+3%) suggests close-game fragility. This is a vulnerable 4-seed — Cal Baptist or St. John's could capitalize.</p>
    <p style="margin-top:8px"><strong style="color:var(--r)">Alabama (4-seed, Midwest):</strong> Elite offense (#3) masked by the 67th-ranked defense and Holloway's arrest. The model's defensive weighting and injury flag push Alabama well below their seed line. Upset risk against Hofstra or Akron.</p>
    <p style="margin-top:8px"><strong style="color:var(--r)">BYU (6-seed, West):</strong> Lost Richie Saunders to an ACL tear and dropped 4 of their last 6. Injury flag + negative momentum = model downgrade despite strong underlying offense.</p>
    <p style="margin-top:8px"><strong style="color:var(--g)">Vanderbilt (5-seed, South):</strong> The model loves this team — negative luck factor means they're BETTER than their record shows. #7 offense, #29 defense, strong rebounding, and hot form entering the tournament. Deep run candidate.</p>
    <p style="margin-top:8px"><strong style="color:var(--g)">Iowa State (2-seed, Midwest):</strong> The #4 defense + #1 turnover-forcing rate is a devastating March combination. Negative luck factor means they've been slightly unlucky. Elite scoring run profile (8.0). Legitimate title contender.</p>
    <p style="margin-top:8px"><strong style="color:var(--g)">Saint Mary's (7-seed, South):</strong> Zero luck inflation, elite defense (#19), great ball security (15.5% TO rate). Underseeded by the committee — the model ranks them well above a typical 7-seed. Sweet 16 candidate.</p>
    <p style="margin-top:8px"><strong style="color:var(--y)">High Point (12-seed, West):</strong> High luck factor (+7%) is the biggest red flag in the entire field. Their 30-4 record far exceeds their underlying quality. Classic regression candidate — pick Wisconsin here.</p>
    <p style="margin-top:8px"><strong style="color:var(--y)">UConn (2-seed, East):</strong> Luck factor (+4%) and high turnover rate (18.5%) are concerns despite elite defense. The model sees them as more vulnerable than their seed suggests — UCLA matchup in R32 is dangerous.</p>
  </div>`;

  return h;
}

// Interaction
window.sv = v => { view = v; render(); };
window.wUp = (k, v) => { W[k]=+v; document.getElementById('wv-'+k).textContent=v+'%'; activePreset=''; clearTimeout(window._wt); window._wt=setTimeout(render,200); };
window.preset = n => { activePreset=n; Object.assign(W, PRESETS[n]); render(); };

render();
</script>
</body>
</html>
